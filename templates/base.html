<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Intelligent System Monitor{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-microchip"></i>
                <h2>SysMonitor AI</h2>
            </div>
            <nav>
                <ul>
                    <li class="{% block nav_dashboard %}{% endblock %}"><a href="/"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                    <li class="{% block nav_analysis %}{% endblock %}"><a href="/analysis"><i class="fas fa-chart-line"></i> Algorithm Analysis</a></li>
                    <li class="{% block nav_processes %}{% endblock %}"><a href="/processes"><i class="fas fa-tasks"></i> Processes</a></li>
                    <li class="{% block nav_system %}{% endblock %}"><a href="/system"><i class="fas fa-server"></i> System Info</a></li>
                    <li class="{% block nav_data %}{% endblock %}"><a href="/data"><i class="fas fa-database"></i> Data Mgmt</a></li>
                </ul>
            </nav>
            <div class="status-indicator">
                <span class="dot"></span> System Online
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <h1>{% block header %}System Overview{% endblock %}</h1>
                <p id="current-time">Loading time...</p>
            </header>

            {% block content %}
            {% endblock %}
        </main>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
